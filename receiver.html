<!DOCTYPE html>
<html>
<head>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
<cast-media-player></cast-media-player>

<script>
const context   = cast.framework.CastReceiverContext.getInstance();
const playerMgr = context.getPlayerManager();

playerMgr.setMessageInterceptor(
  cast.framework.messages.MessageType.LOAD,
  request => {

    const licenseUrl = request.media?.customData?.licenseUrl;

    console.log('[AaoNXT] LOAD intercepted');
    console.log('[AaoNXT] contentUrl:', request.media?.contentUrl);
    console.log('[AaoNXT] licenseUrl:', licenseUrl);

    if (!licenseUrl) {
      console.error('[AaoNXT] No licenseUrl — DRM will fail');
      return request;
    }

    // ── Exactly what Media3 DrmConfiguration does, but for CAF ───────────
    const playbackConfig = new cast.framework.PlaybackConfig();

    playbackConfig.protectionSystem = cast.framework.ContentProtection.WIDEVINE;
    playbackConfig.licenseUrl       = licenseUrl;

    // Re-fires on every renewal — same as Media3 handling it automatically
    playbackConfig.licenseRequestHandler = requestInfo => {
      requestInfo.url = licenseUrl;
    };

    context.setPlaybackConfig(playbackConfig);

    // Keep .m3u8 — no URL rewriting, no contentType change
    return request;
  }
);

context.start();
</script>
</body>
</html>
